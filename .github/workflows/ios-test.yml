name: iOS Automation Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ios-test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Appium
        run: npm install -g appium@3.3.1

      - name: Install XCUITest driver
        run: appium driver install xcuitest

      - name: List available simulators
        run: xcrun simctl list devices available | grep iPhone

      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "iPhone 16" | head -1 | grep -E -o '[0-9A-F-]{36}' | head -1)
          echo "Found UDID: $UDID"
          xcrun simctl boot $UDID || true
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          sleep 60

      - name: Install app on Simulator
        run: |
          xcrun simctl install $SIMULATOR_UDID Measures.ipa || true

      - name: Run iOS Tests
        run: npm run wdio