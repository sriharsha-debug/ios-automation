name: iOS Automation Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  ios-test:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Appium
        run: npm install -g appium@3.3.1

      - name: Install XCUITest driver
        run: appium driver install xcuitest

      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl create "iPhone15Test" "iPhone 15" "com.apple.CoreSimulator.SimRuntime.iOS-18-5")
          xcrun simctl boot $UDID
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl bootstatus $UDID -b

      - name: Run iOS Tests
        run: npm run wdio